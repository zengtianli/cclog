<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 8; }
      .titlebar { fill: #313244; }
      .dot-red { fill: #f38ba8; }
      .dot-yellow { fill: #f9e2af; }
      .dot-green { fill: #a6e3a1; }
      .text { font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .label { fill: #6c7086; }
      .value { fill: #cdd6f4; }
      .green { fill: #a6e3a1; }
      .yellow { fill: #f9e2af; }
      .blue { fill: #89dceb; }
      .pink { fill: #f5c2e7; }
      .sep { fill: #45475a; }
      .header { fill: #89b4fa; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="720" height="460" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="720" height="36" rx="10" fill="#313244"/>
  <rect y="18" width="720" height="18" fill="#313244"/>

  <!-- Window dots -->
  <circle cx="18" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="38" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="58" cy="18" r="6" fill="#a6e3a1"/>

  <!-- Title -->
  <text x="360" y="23" text-anchor="middle" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#6c7086">cclog — terminal</text>

  <!-- Prompt line 1: cclog stats -->
  <text x="20" y="65" class="text prompt">❯</text>
  <text x="34" y="65" class="text cmd">cclog stats</text>

  <!-- Stats output -->
  <text x="20" y="90" class="text header" font-weight="bold">=== cclog Statistics ===</text>

  <text x="20" y="114" class="text label">  Sessions:    </text>
  <text x="140" y="114" class="text green">142</text>

  <text x="20" y="134" class="text label">  Projects:    </text>
  <text x="140" y="134" class="text green">18</text>

  <text x="20" y="154" class="text label">  Summarized:  </text>
  <text x="140" y="154" class="text yellow">87</text>

  <text x="20" y="174" class="text label">  Total time:  </text>
  <text x="140" y="174" class="text blue">63.4 hours</text>

  <text x="20" y="194" class="text label">  Input tokens: </text>
  <text x="148" y="194" class="text pink">12.3M</text>

  <text x="20" y="214" class="text label">  Output tokens:</text>
  <text x="148" y="214" class="text pink">4.1M</text>

  <text x="20" y="234" class="text label">  Date range:  </text>
  <text x="140" y="234" class="text value">2026-01-05 ~ 2026-03-30</text>

  <!-- Separator -->
  <line x1="20" y1="248" x2="700" y2="248" stroke="#45475a" stroke-width="1"/>

  <!-- Prompt line 2: cclog list -->
  <text x="20" y="268" class="text prompt">❯</text>
  <text x="34" y="268" class="text cmd">cclog list --limit 5</text>

  <!-- List header -->
  <text x="20" y="292" class="text header">Date         Duration  Msgs  Project                   Title / Summary</text>
  <text x="20" y="305" class="text sep">────────────────────────────────────────────────────────────────────────────────────</text>

  <!-- List rows -->
  <text x="20" y="322" class="text value">2026-03-30      </text>
  <text x="130" y="322" class="text blue">42m</text>
  <text x="165" y="322" class="text value">   87  </text>
  <text x="210" y="322" class="text yellow">cclog               </text>
  <text x="360" y="322" class="text value">Overhaul README and add bilingual...</text>

  <text x="20" y="342" class="text value">2026-03-29      </text>
  <text x="130" y="342" class="text blue">78m</text>
  <text x="165" y="342" class="text value">  134  </text>
  <text x="210" y="342" class="text yellow">dockit              </text>
  <text x="360" y="342" class="text value">Add chart generation and Gantt sup...</text>

  <text x="20" y="362" class="text value">2026-03-28      </text>
  <text x="130" y="362" class="text blue">31m</text>
  <text x="165" y="362" class="text value">   52  </text>
  <text x="210" y="362" class="text yellow">api-server          </text>
  <text x="360" y="362" class="text value">Fix rate limiting edge case in auth...</text>

  <text x="20" y="382" class="text value">2026-03-27      </text>
  <text x="130" y="382" class="text blue">55m</text>
  <text x="165" y="382" class="text value">   93  </text>
  <text x="210" y="382" class="text yellow">cclog               </text>
  <text x="360" y="382" class="text value">Implement session digest command...</text>

  <text x="20" y="402" class="text value">2026-03-26      </text>
  <text x="130" y="402" class="text blue">19m</text>
  <text x="165" y="402" class="text value">   28  </text>
  <text x="210" y="402" class="text yellow">infra               </text>
  <text x="360" y="402" class="text value">Update Docker compose for staging...</text>

  <text x="20" y="426" class="text sep">  (5 sessions)</text>

  <!-- Cursor -->
  <text x="20" y="448" class="text prompt">❯</text>
  <rect x="34" y="436" width="8" height="14" fill="#89b4fa" opacity="0.8"/>
</svg>
